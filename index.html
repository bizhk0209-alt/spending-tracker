<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Daily Spend</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ===== Screen 1: Month List ===== -->
    <div id="monthScreen" class="screen active">
      <div class="month-nav">
        <button id="monthPrev" class="nav-btn">&larr;</button>
        <h1 id="monthTitle"></h1>
        <button id="monthNext" class="nav-btn">&rarr;</button>
      </div>
      <div id="monthSummary" class="month-summary"></div>
      <div id="monthBreakdown" class="month-breakdown"></div>
      <ul id="monthList" class="month-list"></ul>
      <p id="monthEmpty" class="empty-msg">まだ記録がありません<br><a href="seed.html" class="restore-link">データを復元する</a></p>
      <button id="monthAddBtn" class="fab">+</button>
      <div class="month-footer">
        <button id="statsBtn" class="data-btn">📊 統計</button>
        <button id="exportDataBtn" class="data-btn">書き出し</button>
        <button id="importDataBtn" class="data-btn">取り込み</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
    </div>

    <!-- ===== Screen 2: Day Detail ===== -->
    <div id="dayScreen" class="screen">
      <header class="screen-header">
        <button id="backBtn" class="back-btn">&larr; 戻る</button>
      </header>
      <div class="day-header">
        <h2 id="dayDate"></h2>
        <div id="dayEvent" class="day-event"></div>
      </div>
      <div id="dayTotal" class="day-total">¥0</div>
      <ul id="txList" class="tx-list"></ul>
      <div id="hibiSummary" class="hibi-summary" style="display:none"></div>
      <p id="dayEmpty" class="empty-msg">＋ ボタンで支出を追加</p>
      <button id="addBtn" class="fab">+</button>
      <button id="exportBtn" class="export-btn">CSV出力</button>
    </div>

    <!-- ===== Screen 3: Add/Edit Entry ===== -->
    <div id="addScreen" class="screen">
      <header class="screen-header">
        <button id="addBackBtn" class="back-btn">&larr; 戻る</button>
      </header>
      <h2 id="addTitle" class="add-title">支出を追加</h2>

      <label class="field-label">日付</label>
      <div id="dateDisplay" class="date-display"></div>

      <label class="field-label">種別 <span class="required">*必須</span></label>
      <div id="typeToggle" class="type-toggle">
        <button type="button" class="type-btn active" data-type="private">🏠 プライベート</button>
        <button type="button" class="type-btn" data-type="work">💼 仕事</button>
      </div>

      <label class="field-label">イベント名 <span class="required">*必須</span></label>
      <input type="text" id="eventInput" class="field-input" placeholder="例: いちご狩り、旅行、日常" autocomplete="off">

      <label class="field-label">内訳 <span class="required">*1件以上必須</span><button type="button" id="editPresetsBtn" class="preset-edit-btn">✏️ 編集</button></label>
      <div id="presetGrid" class="preset-grid"></div>
      <div id="itemsContainer" class="items-container"></div>
      <button id="addItemBtn" class="add-item-btn">＋ その他（自由入力）</button>

      <div id="autoTotal" class="auto-total">合計: ¥0</div>
      <button id="saveBtn" class="save-btn" disabled>保存</button>
    </div>

    <!-- ===== Screen 4: Stats ===== -->
    <div id="statsScreen" class="screen">
      <header class="screen-header">
        <button id="statsBackBtn" class="back-btn">&larr; 戻る</button>
      </header>
      <h2 class="add-title">📊 統計</h2>
      <div class="stats-year-nav">
        <button id="statsPrevYear" class="nav-btn">&larr;</button>
        <span id="statsYearLabel"></span>
        <button id="statsNextYear" class="nav-btn">&rarr;</button>
      </div>
      <div id="statsContent"></div>
    </div>

  <!-- ===== Preset Management Modal ===== -->
  <div id="presetModal" class="modal-overlay" style="display:none">
    <div class="modal-sheet">
      <div class="modal-header">
        <h3 class="modal-title">カテゴリ管理</h3>
        <button id="presetModalClose" class="modal-close-btn">完了</button>
      </div>
      <ul id="presetModalList" class="preset-modal-list"></ul>
      <div class="preset-modal-add">
        <input type="text" id="presetNewInput" class="field-input" placeholder="新しいカテゴリ名を入力">
        <button id="presetAddConfirm" class="preset-add-confirm">追加</button>
      </div>
    </div>
  </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
