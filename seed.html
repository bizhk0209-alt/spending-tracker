<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>データ復元中...</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100dvh; margin: 0; background: #f5f5f7; }

</head>
<body>
<div class="box">
  <h2>✅ データを復元しました</h2>
  <p>アプリに移動します...</p>
</div>
<script>
const entries = [

const current = JSON.parse(localStorage.getItem('spend_v2') || '[]');
const existingIds = new Set(current.map(e => e.id));
const merged = [...current, ...entries.filter(e => !existingIds.has(e.id))];

setTimeout(() => { location.href = './'; }, 1200);
</script>
</body>
